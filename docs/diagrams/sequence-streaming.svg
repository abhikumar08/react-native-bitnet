<svg xmlns="http://www.w3.org/2000/svg" width="680" viewBox="0 0 680 820" role="img" aria-labelledby="title desc">
  <title id="title">End-to-end sequence: demo prompt to streamed tokens</title>
  <desc id="desc">Six vertical lifelines: chat UI, public TS Engine, Kotlin BitnetModule, JNI bridge, C++ BitnetEngine, llama.cpp. Three phases top to bottom: apply chat template (synchronous downcall), generate (streaming loop with tokens bubbling up), EOS (promise resolves).</desc>
  <style>
    .title { font: 500 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .sub   { font: 400 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .gray  { fill: #F1EFE8; stroke: #5F5E5A; stroke-width: 0.5; }
    .gray-title { fill: #2C2C2A; }
    .teal  { fill: #E1F5EE; stroke: #0F6E56; stroke-width: 0.5; }
    .teal-title { fill: #04342C; }
    .coral { fill: #FAECE7; stroke: #993C1D; stroke-width: 0.5; }
    .coral-title { fill: #4A1B0C; }
    .lifeline { stroke: #888780; stroke-width: 0.5; stroke-dasharray: 3 3; opacity: 0.5; }
    .arrow      { stroke: #444441; stroke-width: 1.5; fill: none; }
    .arrow-back { stroke: #5F5E5A; stroke-width: 0.5; stroke-dasharray: 4 4; fill: none; }
    .label  { fill: #2C2C2A; }
    .label-back { fill: #5F5E5A; }
    .phase-rule { stroke: #B4B2A9; stroke-width: 0.5; opacity: 0.5; }
    .phase-lbl  { fill: #5F5E5A; font: 500 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .loop-box   { stroke: #888780; stroke-width: 0.5; stroke-dasharray: 3 3; opacity: 0.5; fill: none; }
    .loop-lbl   { fill: #5F5E5A; font-style: italic; }
  </style>
  <defs>
    <marker id="arrowhead" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Lifeline header boxes -->
  <rect class="gray"  x="20"  y="20" width="100" height="36" rx="6"/>
  <text class="title gray-title"  x="70"  y="38" text-anchor="middle" dominant-baseline="central">Chat UI</text>
  <rect class="teal"  x="130" y="20" width="100" height="36" rx="6"/>
  <text class="title teal-title"  x="180" y="38" text-anchor="middle" dominant-baseline="central">Engine (TS)</text>
  <rect class="teal"  x="240" y="20" width="100" height="36" rx="6"/>
  <text class="title teal-title"  x="290" y="38" text-anchor="middle" dominant-baseline="central">BitnetModule</text>
  <rect class="coral" x="350" y="20" width="100" height="36" rx="6"/>
  <text class="title coral-title" x="400" y="38" text-anchor="middle" dominant-baseline="central">JNI bridge</text>
  <rect class="coral" x="460" y="20" width="100" height="36" rx="6"/>
  <text class="title coral-title" x="510" y="38" text-anchor="middle" dominant-baseline="central">BitnetEngine</text>
  <rect class="gray"  x="570" y="20" width="90"  height="36" rx="6"/>
  <text class="title gray-title"  x="615" y="38" text-anchor="middle" dominant-baseline="central">llama.cpp</text>

  <!-- Lifelines -->
  <line class="lifeline" x1="70"  y1="56" x2="70"  y2="780"/>
  <line class="lifeline" x1="180" y1="56" x2="180" y2="780"/>
  <line class="lifeline" x1="290" y1="56" x2="290" y2="780"/>
  <line class="lifeline" x1="400" y1="56" x2="400" y2="780"/>
  <line class="lifeline" x1="510" y1="56" x2="510" y2="780"/>
  <line class="lifeline" x1="615" y1="56" x2="615" y2="780"/>

  <!-- Phase 1: apply chat template -->
  <text class="sub label" x="20" y="84">User taps send</text>

  <line class="arrow" x1="70" y1="96" x2="178" y2="96" marker-end="url(#arrowhead)"/>
  <text class="sub label" x="74" y="92">applyChatTemplate(messages)</text>

  <line class="arrow" x1="180" y1="118" x2="288" y2="118" marker-end="url(#arrowhead)"/>
  <text class="sub label" x="184" y="114">JSON.stringify(roles)</text>

  <line class="arrow" x1="290" y1="140" x2="398" y2="140" marker-end="url(#arrowhead)"/>
  <text class="sub label" x="294" y="136">nativeApplyChatTemplate</text>

  <line class="arrow" x1="400" y1="162" x2="508" y2="162" marker-end="url(#arrowhead)"/>
  <text class="sub label" x="404" y="158">parse · build prompt</text>

  <line class="arrow-back" x1="510" y1="184" x2="398" y2="184" marker-end="url(#arrowhead)"/>
  <text class="sub label-back" x="404" y="180">templated prompt string</text>

  <line class="arrow-back" x1="400" y1="206" x2="292" y2="206" marker-end="url(#arrowhead)"/>
  <line class="arrow-back" x1="290" y1="228" x2="182" y2="228" marker-end="url(#arrowhead)"/>
  <line class="arrow-back" x1="180" y1="250" x2="72"  y2="250" marker-end="url(#arrowhead)"/>

  <!-- Phase 2: generate -->
  <line class="phase-rule" x1="20" y1="282" x2="660" y2="282"/>
  <text class="phase-lbl"  x="20" y="300">generate · async</text>

  <line class="arrow" x1="70" y1="312" x2="178" y2="312" marker-end="url(#arrowhead)"/>
  <text class="sub label" x="74" y="308">engine.generate(prompt, onToken)</text>

  <line class="arrow" x1="180" y1="334" x2="288" y2="334" marker-end="url(#arrowhead)"/>
  <text class="sub label" x="184" y="330">nativeGenerate(handle, params)</text>

  <text class="sub label" x="180" y="358">addListener('BitnetToken')</text>

  <line class="arrow" x1="290" y1="378" x2="398" y2="378" marker-end="url(#arrowhead)"/>
  <text class="sub label" x="294" y="374">spawn worker thread</text>

  <line class="arrow" x1="400" y1="400" x2="508" y2="400" marker-end="url(#arrowhead)"/>
  <text class="sub label" x="404" y="396">engine-&gt;generate(cb)</text>

  <!-- Streaming loop frame -->
  <rect class="loop-box" x="430" y="426" width="240" height="240" rx="6"/>
  <text class="sub loop-lbl" x="440" y="444">loop · per token until EOS</text>

  <line class="arrow" x1="510" y1="466" x2="613" y2="466" marker-end="url(#arrowhead)"/>
  <text class="sub label" x="514" y="462">llama_decode · sample</text>

  <line class="arrow-back" x1="615" y1="488" x2="512" y2="488" marker-end="url(#arrowhead)"/>
  <text class="sub label-back" x="514" y="484">token id · detokenized piece</text>

  <line class="arrow" x1="508" y1="510" x2="402" y2="510" marker-end="url(#arrowhead)"/>
  <text class="sub label" x="404" y="506">onToken(piece)</text>

  <line class="arrow" x1="398" y1="532" x2="292" y2="532" marker-end="url(#arrowhead)"/>
  <text class="sub label" x="294" y="528">emitToken(env, piece)</text>

  <line class="arrow" x1="288" y1="554" x2="182" y2="554" marker-end="url(#arrowhead)"/>
  <text class="sub label" x="184" y="550">DeviceEventEmitter</text>

  <line class="arrow" x1="178" y1="576" x2="72" y2="576" marker-end="url(#arrowhead)"/>
  <text class="sub label" x="74" y="572">listener fires · onToken</text>

  <text class="sub label" x="20" y="598">setState · append piece</text>

  <text class="sub loop-lbl" x="440" y="640">next iteration · llama_decode</text>
  <line class="arrow" x1="510" y1="652" x2="613" y2="652" marker-end="url(#arrowhead)" opacity="0.6"/>

  <!-- Phase 3: EOS -->
  <line class="phase-rule" x1="20" y1="690" x2="660" y2="690"/>
  <text class="phase-lbl"  x="20" y="708">EOS reached</text>

  <line class="arrow-back" x1="510" y1="720" x2="402" y2="720" marker-end="url(#arrowhead)"/>
  <text class="sub label-back" x="404" y="716">stats · final text</text>
  <line class="arrow-back" x1="400" y1="742" x2="292" y2="742" marker-end="url(#arrowhead)"/>
  <line class="arrow-back" x1="290" y1="764" x2="182" y2="764" marker-end="url(#arrowhead)"/>
  <text class="sub label-back" x="184" y="760">resolve Promise · remove listener</text>
</svg>
