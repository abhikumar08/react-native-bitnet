<svg xmlns="http://www.w3.org/2000/svg" width="820" viewBox="0 0 820 720" role="img" aria-labelledby="title desc">
  <title id="title">react-native-bitnet SDK architecture</title>
  <desc id="desc">The SDK organized as three vertical bands. The left band is inference: Engine, generate, stream, and chat.completions facade in TypeScript, descending through the TurboModule spec into the Kotlin module, then through JNI to the C++ BitnetEngine and the vendored llama.cpp prebuilts. The right band is the model lifecycle: the Models namespace in TypeScript over a download manager in Kotlin, backed by a foreground download service and Android filesystem. Both bands share the same TurboModule spec at the top and runtime boundaries (JS/JVM and JNI) cross horizontally across both. At the very bottom is the Android filesystem with the cache directory under context.filesDir.</desc>
  <style>
    .title { font: 500 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .sub   { font: 400 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .col-hdr { font: 600 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: 0.5px; }
    .gray  { fill: #F1EFE8; stroke: #5F5E5A; stroke-width: 0.5; }
    .gray-title { fill: #2C2C2A; }
    .gray-sub   { fill: #5F5E5A; }
    .teal  { fill: #E1F5EE; stroke: #0F6E56; stroke-width: 0.5; }
    .teal-title { fill: #04342C; }
    .teal-sub   { fill: #0F6E56; }
    .coral { fill: #FAECE7; stroke: #993C1D; stroke-width: 0.5; }
    .coral-title { fill: #4A1B0C; }
    .coral-sub   { fill: #993C1D; }
    .amber { fill: #FAF1DC; stroke: #856300; stroke-width: 0.5; }
    .amber-title { fill: #3D2D00; }
    .amber-sub   { fill: #856300; }
    .arrow      { stroke: #444441; stroke-width: 1.5; fill: none; }
    .divider    { stroke: #888780; stroke-width: 0.5; stroke-dasharray: 4 4; opacity: 0.55; }
    .div-lbl    { fill: #5F5E5A; }
    .col-rule   { stroke: #B4B2A9; stroke-width: 0.5; stroke-dasharray: 2 4; opacity: 0.4; }
  </style>
  <defs>
    <marker id="arrowhead" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Column headers -->
  <text class="col-hdr gray-sub"  x="200" y="28" text-anchor="middle">INFERENCE</text>
  <text class="col-hdr gray-sub"  x="620" y="28" text-anchor="middle">MODEL LIFECYCLE</text>

  <!-- Vertical guide between columns -->
  <line class="col-rule" x1="410" y1="50" x2="410" y2="540"/>

  <!-- ===================== ROW 1: Consumer app spans both columns ===================== -->
  <rect class="gray" x="60" y="50" width="700" height="46" rx="8"/>
  <text class="title gray-title" x="410" y="67" text-anchor="middle" dominant-baseline="central">example/ — consumer app (chat UI, model picker, settings)</text>
  <text class="sub   gray-sub"   x="410" y="85" text-anchor="middle" dominant-baseline="central">imports Engine and Models from react-native-bitnet</text>

  <line class="arrow" x1="200" y1="100" x2="200" y2="118" marker-end="url(#arrowhead)"/>
  <line class="arrow" x1="620" y1="100" x2="620" y2="118" marker-end="url(#arrowhead)"/>

  <!-- ===================== ROW 2: Public TS API (Engine | Models) ===================== -->
  <rect class="teal" x="60"  y="124" width="280" height="58" rx="8"/>
  <text class="title teal-title" x="200" y="142" text-anchor="middle" dominant-baseline="central">Engine · Bitnet</text>
  <text class="sub   teal-sub"   x="200" y="162" text-anchor="middle" dominant-baseline="central">generate · stream · chat.completions.create</text>
  <text class="sub   teal-sub"   x="200" y="174" text-anchor="middle" dominant-baseline="central">cancel · applyChatTemplate · dispose</text>

  <rect class="teal" x="480" y="124" width="280" height="58" rx="8"/>
  <text class="title teal-title" x="620" y="142" text-anchor="middle" dominant-baseline="central">Models</text>
  <text class="sub   teal-sub"   x="620" y="162" text-anchor="middle" dominant-baseline="central">download · list · resumeAll · delete</text>
  <text class="sub   teal-sub"   x="620" y="174" text-anchor="middle" dominant-baseline="central">cacheSize · cacheDir · isCached · resolve</text>

  <line class="arrow" x1="200" y1="186" x2="200" y2="206" marker-end="url(#arrowhead)"/>
  <line class="arrow" x1="620" y1="186" x2="620" y2="206" marker-end="url(#arrowhead)"/>

  <!-- ===================== ROW 3: TurboModule spec (shared) ===================== -->
  <rect class="teal" x="60" y="212" width="700" height="48" rx="8"/>
  <text class="title teal-title" x="410" y="230" text-anchor="middle" dominant-baseline="central">NativeBitnet — TurboModule spec (codegen)</text>
  <text class="sub   teal-sub"   x="410" y="248" text-anchor="middle" dominant-baseline="central">JS → native method shapes · BitnetToken and BitnetDownloadProgress event channels</text>

  <!-- Boundary: JS / JVM -->
  <line class="divider" x1="40" y1="278" x2="780" y2="278"/>
  <text class="sub div-lbl" x="785" y="282">JS · JVM</text>

  <line class="arrow" x1="200" y1="262" x2="200" y2="296" marker-end="url(#arrowhead)"/>
  <line class="arrow" x1="620" y1="262" x2="620" y2="296" marker-end="url(#arrowhead)"/>

  <!-- ===================== ROW 4: Kotlin module (split) ===================== -->
  <rect class="teal" x="60"  y="302" width="280" height="58" rx="8"/>
  <text class="title teal-title" x="200" y="320" text-anchor="middle" dominant-baseline="central">BitnetModule.kt</text>
  <text class="sub   teal-sub"   x="200" y="340" text-anchor="middle" dominant-baseline="central">single-flight gate · requestId routing</text>
  <text class="sub   teal-sub"   x="200" y="352" text-anchor="middle" dominant-baseline="central">DeviceEventEmitter('BitnetToken')</text>

  <rect class="teal" x="480" y="302" width="280" height="58" rx="8"/>
  <text class="title teal-title" x="620" y="320" text-anchor="middle" dominant-baseline="central">ModelDownloader.kt</text>
  <text class="sub   teal-sub"   x="620" y="340" text-anchor="middle" dominant-baseline="central">dedup · resume · ETag/If-Range · checksums</text>
  <text class="sub   teal-sub"   x="620" y="352" text-anchor="middle" dominant-baseline="central">DeviceEventEmitter('BitnetDownloadProgress')</text>

  <!-- Boundary: JNI on the left, FS on the right -->
  <line class="divider" x1="40" y1="382" x2="780" y2="382"/>
  <text class="sub div-lbl" x="20" y="378" text-anchor="start">JNI</text>
  <text class="sub div-lbl" x="785" y="378">Foreground service · FS</text>

  <line class="arrow" x1="200" y1="364" x2="200" y2="400" marker-end="url(#arrowhead)"/>
  <line class="arrow" x1="620" y1="364" x2="620" y2="400" marker-end="url(#arrowhead)"/>

  <!-- ===================== ROW 5: Native bridge / service ===================== -->
  <rect class="coral" x="60"  y="406" width="280" height="58" rx="8"/>
  <text class="title coral-title" x="200" y="424" text-anchor="middle" dominant-baseline="central">bitnet_jni.cpp</text>
  <text class="sub   coral-sub"   x="200" y="444" text-anchor="middle" dominant-baseline="central">JNI bridge · EngineRegistry</text>
  <text class="sub   coral-sub"   x="200" y="456" text-anchor="middle" dominant-baseline="central">emitToken via env→CallVoidMethod</text>

  <rect class="amber" x="480" y="406" width="280" height="58" rx="8"/>
  <text class="title amber-title" x="620" y="424" text-anchor="middle" dominant-baseline="central">BitnetDownloadService</text>
  <text class="sub   amber-sub"   x="620" y="444" text-anchor="middle" dominant-baseline="central">Android foreground service</text>
  <text class="sub   amber-sub"   x="620" y="456" text-anchor="middle" dominant-baseline="central">survives backgrounding · POST_NOTIFICATIONS</text>

  <line class="arrow" x1="200" y1="468" x2="200" y2="488" marker-end="url(#arrowhead)"/>
  <line class="arrow" x1="620" y1="468" x2="620" y2="488" marker-end="url(#arrowhead)"/>

  <!-- ===================== ROW 6: Engine + filesystem ===================== -->
  <rect class="coral" x="60" y="494" width="280" height="46" rx="8"/>
  <text class="title coral-title" x="200" y="511" text-anchor="middle" dominant-baseline="central">BitnetEngine (C++)</text>
  <text class="sub   coral-sub"   x="200" y="529" text-anchor="middle" dominant-baseline="central">platform-agnostic inference</text>

  <rect class="gray" x="480" y="494" width="280" height="46" rx="8"/>
  <text class="title gray-title" x="620" y="511" text-anchor="middle" dominant-baseline="central">Android filesystem</text>
  <text class="sub   gray-sub"   x="620" y="529" text-anchor="middle" dominant-baseline="central">context.filesDir/bitnet-models/{cacheKey}/</text>

  <!-- Bridge: filesystem feeds the engine via modelPath -->
  <path class="arrow" d="M 480 517 L 350 517" stroke-dasharray="3 3" marker-end="url(#arrowhead)"/>
  <text class="sub div-lbl" x="415" y="510" text-anchor="middle">modelPath</text>

  <!-- ===================== ROW 7: vendor boundary + prebuilts ===================== -->
  <line class="divider" x1="40" y1="562" x2="780" y2="562"/>
  <text class="sub div-lbl" x="20" y="558" text-anchor="start">SDK · vendor</text>

  <line class="arrow" x1="200" y1="544" x2="200" y2="580" marker-end="url(#arrowhead)"/>

  <rect class="gray" x="60" y="586" width="280" height="46" rx="8"/>
  <text class="title gray-title" x="200" y="603" text-anchor="middle" dominant-baseline="central">libllama.so + libggml.so</text>
  <text class="sub   gray-sub"   x="200" y="621" text-anchor="middle" dominant-baseline="central">BitNet prebuilt · arm64-v8a</text>

  <!-- Legend -->
  <g transform="translate(60, 666)">
    <rect class="teal"  x="0"   y="0" width="14" height="14" rx="2"/>
    <text class="sub teal-sub"  x="20" y="11">managed runtime (JS · Kotlin)</text>
    <rect class="coral" x="200" y="0" width="14" height="14" rx="2"/>
    <text class="sub coral-sub" x="220" y="11">native SDK code (C++ JNI · engine)</text>
    <rect class="amber" x="430" y="0" width="14" height="14" rx="2"/>
    <text class="sub amber-sub" x="450" y="11">platform service (Android FG service)</text>
    <rect class="gray"  x="640" y="0" width="14" height="14" rx="2"/>
    <text class="sub gray-sub"  x="660" y="11">not SDK code (host · vendor · OS)</text>
  </g>
</svg>
