<svg xmlns="http://www.w3.org/2000/svg" width="680" viewBox="0 0 680 730" role="img" aria-labelledby="title desc">
  <title id="title">react-native-bitnet SDK architecture</title>
  <desc id="desc">Seven-layer stack from the demo app at the top to the prebuilt llama.cpp and ggml libraries at the bottom, with the JS/JVM, JNI, and SDK/vendor boundaries marked.</desc>
  <style>
    .title { font: 500 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .sub   { font: 400 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .gray  { fill: #F1EFE8; stroke: #5F5E5A; stroke-width: 0.5; }
    .gray-title { fill: #2C2C2A; }
    .gray-sub   { fill: #5F5E5A; }
    .teal  { fill: #E1F5EE; stroke: #0F6E56; stroke-width: 0.5; }
    .teal-title { fill: #04342C; }
    .teal-sub   { fill: #0F6E56; }
    .coral { fill: #FAECE7; stroke: #993C1D; stroke-width: 0.5; }
    .coral-title { fill: #4A1B0C; }
    .coral-sub   { fill: #993C1D; }
    .arrow   { stroke: #444441; stroke-width: 1.5; fill: none; }
    .divider { stroke: #888780; stroke-width: 0.5; stroke-dasharray: 4 4; opacity: 0.5; }
    .div-lbl { fill: #5F5E5A; }
  </style>
  <defs>
    <marker id="arrowhead" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Layer 1: demo app -->
  <rect class="gray" x="140" y="40" width="400" height="56" rx="8"/>
  <text class="title gray-title" x="340" y="58" text-anchor="middle" dominant-baseline="central">apps/demo</text>
  <text class="sub gray-sub"     x="340" y="76" text-anchor="middle" dominant-baseline="central">Consumer app (chat UI)</text>
  <line class="arrow" x1="340" y1="102" x2="340" y2="122" marker-end="url(#arrowhead)"/>

  <!-- Layer 2: public TS API -->
  <rect class="teal" x="140" y="128" width="400" height="56" rx="8"/>
  <text class="title teal-title" x="340" y="146" text-anchor="middle" dominant-baseline="central">Engine · Bitnet</text>
  <text class="sub teal-sub"     x="340" y="164" text-anchor="middle" dominant-baseline="central">Public TypeScript API</text>
  <line class="arrow" x1="340" y1="190" x2="340" y2="210" marker-end="url(#arrowhead)"/>

  <!-- Layer 3: TurboModule spec -->
  <rect class="teal" x="140" y="216" width="400" height="56" rx="8"/>
  <text class="title teal-title" x="340" y="234" text-anchor="middle" dominant-baseline="central">NativeBitnet</text>
  <text class="sub teal-sub"     x="340" y="252" text-anchor="middle" dominant-baseline="central">TurboModule spec (codegen)</text>

  <!-- Boundary: JS / JVM -->
  <line class="divider" x1="80" y1="296" x2="540" y2="296"/>
  <text class="sub div-lbl" x="550" y="300">JS · JVM</text>
  <line class="arrow" x1="340" y1="278" x2="340" y2="320" marker-end="url(#arrowhead)"/>

  <!-- Layer 4: Kotlin module -->
  <rect class="teal" x="140" y="326" width="400" height="56" rx="8"/>
  <text class="title teal-title" x="340" y="344" text-anchor="middle" dominant-baseline="central">BitnetModule.kt</text>
  <text class="sub teal-sub"     x="340" y="362" text-anchor="middle" dominant-baseline="central">Kotlin module + event emitter</text>

  <!-- Boundary: JNI -->
  <line class="divider" x1="80" y1="406" x2="540" y2="406"/>
  <text class="sub div-lbl" x="550" y="410">JNI</text>
  <line class="arrow" x1="340" y1="388" x2="340" y2="430" marker-end="url(#arrowhead)"/>

  <!-- Layer 5: JNI bridge -->
  <rect class="coral" x="140" y="436" width="400" height="56" rx="8"/>
  <text class="title coral-title" x="340" y="454" text-anchor="middle" dominant-baseline="central">bitnet_jni.cpp</text>
  <text class="sub coral-sub"     x="340" y="472" text-anchor="middle" dominant-baseline="central">JNI bridge · engine registry</text>
  <line class="arrow" x1="340" y1="498" x2="340" y2="518" marker-end="url(#arrowhead)"/>

  <!-- Layer 6: BitnetEngine -->
  <rect class="coral" x="140" y="524" width="400" height="56" rx="8"/>
  <text class="title coral-title" x="340" y="542" text-anchor="middle" dominant-baseline="central">BitnetEngine</text>
  <text class="sub coral-sub"     x="340" y="560" text-anchor="middle" dominant-baseline="central">C++ inference engine</text>

  <!-- Boundary: SDK / vendor -->
  <line class="divider" x1="80" y1="604" x2="540" y2="604"/>
  <text class="sub div-lbl" x="550" y="608">SDK · vendor</text>
  <line class="arrow" x1="340" y1="586" x2="340" y2="628" marker-end="url(#arrowhead)"/>

  <!-- Layer 7: vendored prebuilts -->
  <rect class="gray" x="140" y="634" width="400" height="56" rx="8"/>
  <text class="title gray-title" x="340" y="652" text-anchor="middle" dominant-baseline="central">libllama.so + libggml.so</text>
  <text class="sub gray-sub"     x="340" y="670" text-anchor="middle" dominant-baseline="central">Prebuilt BitNet · arm64-v8a</text>
</svg>
