<svg xmlns="http://www.w3.org/2000/svg" width="720" viewBox="0 0 720 880" role="img" aria-labelledby="title desc">
  <title id="title">Model lifecycle sequence: download, cache, resume, load</title>
  <desc id="desc">Six lifelines: caller code, public TS Models namespace, Kotlin DownloadManager, foreground download service, HuggingFace or HTTP origin, and the app filesystem cache directory. Three phases: first-call download (with resume from .part file, ETag check, foreground service start, checksum verify, commit to final path), dedup of concurrent calls, and engine load from the cached path.</desc>
  <style>
    .title { font: 500 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .sub   { font: 400 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .gray  { fill: #F1EFE8; stroke: #5F5E5A; stroke-width: 0.5; }
    .gray-title { fill: #2C2C2A; }
    .teal  { fill: #E1F5EE; stroke: #0F6E56; stroke-width: 0.5; }
    .teal-title { fill: #04342C; }
    .amber { fill: #FAF1DC; stroke: #856300; stroke-width: 0.5; }
    .amber-title { fill: #3D2D00; }
    .lifeline   { stroke: #888780; stroke-width: 0.5; stroke-dasharray: 3 3; opacity: 0.5; }
    .arrow      { stroke: #444441; stroke-width: 1.5; fill: none; }
    .arrow-back { stroke: #5F5E5A; stroke-width: 0.5; stroke-dasharray: 4 4; fill: none; }
    .label      { fill: #2C2C2A; }
    .label-back { fill: #5F5E5A; }
    .phase-rule { stroke: #B4B2A9; stroke-width: 0.5; opacity: 0.5; }
    .phase-lbl  { fill: #5F5E5A; font: 500 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .loop-box   { stroke: #888780; stroke-width: 0.5; stroke-dasharray: 3 3; opacity: 0.5; fill: none; }
    .alt-box    { stroke: #0F6E56; stroke-width: 0.5; stroke-dasharray: 3 3; opacity: 0.6; fill: none; }
    .loop-lbl   { fill: #5F5E5A; font-style: italic; }
    .alt-lbl    { fill: #0F6E56; font-style: italic; }
  </style>
  <defs>
    <marker id="arrowhead" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Lifeline headers -->
  <rect class="gray"  x="20"  y="20" width="90"  height="36" rx="6"/>
  <text class="title gray-title"  x="65"  y="38" text-anchor="middle" dominant-baseline="central">Caller</text>
  <rect class="teal"  x="125" y="20" width="100" height="36" rx="6"/>
  <text class="title teal-title"  x="175" y="38" text-anchor="middle" dominant-baseline="central">Models (TS)</text>
  <rect class="teal"  x="240" y="20" width="120" height="36" rx="6"/>
  <text class="title teal-title"  x="300" y="38" text-anchor="middle" dominant-baseline="central">DownloadManager</text>
  <rect class="amber" x="375" y="20" width="110" height="36" rx="6"/>
  <text class="title amber-title" x="430" y="38" text-anchor="middle" dominant-baseline="central">FG service</text>
  <rect class="gray"  x="500" y="20" width="100" height="36" rx="6"/>
  <text class="title gray-title"  x="550" y="38" text-anchor="middle" dominant-baseline="central">HTTP origin</text>
  <rect class="gray"  x="615" y="20" width="90"  height="36" rx="6"/>
  <text class="title gray-title"  x="660" y="38" text-anchor="middle" dominant-baseline="central">Filesystem</text>

  <!-- Lifelines -->
  <line class="lifeline" x1="65"  y1="56" x2="65"  y2="850"/>
  <line class="lifeline" x1="175" y1="56" x2="175" y2="850"/>
  <line class="lifeline" x1="300" y1="56" x2="300" y2="850"/>
  <line class="lifeline" x1="430" y1="56" x2="430" y2="850"/>
  <line class="lifeline" x1="550" y1="56" x2="550" y2="850"/>
  <line class="lifeline" x1="660" y1="56" x2="660" y2="850"/>

  <!-- ===================== Phase 1: cache key + existing-state check ===================== -->
  <text class="phase-lbl" x="20" y="82">cache lookup</text>

  <line class="arrow" x1="65" y1="100" x2="173" y2="100" marker-end="url(#arrowhead)"/>
  <text class="sub label" x="74" y="96">download(modelRef, opts)</text>

  <text class="sub label" x="125" y="118">resolve(ref) → cacheKey</text>

  <line class="arrow" x1="175" y1="138" x2="298" y2="138" marker-end="url(#arrowhead)"/>
  <text class="sub label" x="180" y="134">queue(cacheKey, opts)</text>

  <!-- Dedup branch -->
  <rect class="alt-box" x="240" y="152" width="240" height="44" rx="6"/>
  <text class="sub alt-lbl" x="248" y="168">opt — task already in flight</text>
  <line class="arrow-back" x1="298" y1="186" x2="177" y2="186" marker-end="url(#arrowhead)"/>
  <text class="sub label-back" x="180" y="182">attach to existing task · share progress</text>

  <!-- Filesystem probe -->
  <line class="arrow" x1="300" y1="212" x2="658" y2="212" marker-end="url(#arrowhead)"/>
  <text class="sub label" x="308" y="208">stat({cacheKey}/model.gguf · model.gguf.part · meta.json)</text>
  <line class="arrow-back" x1="660" y1="232" x2="302" y2="232" marker-end="url(#arrowhead)"/>
  <text class="sub label-back" x="308" y="228">existing .part: 412 MB · meta.etag: "abc123"</text>

  <!-- ===================== Phase 2: range request + foreground service ===================== -->
  <line class="phase-rule" x1="20" y1="254" x2="700" y2="254"/>
  <text class="phase-lbl"  x="20" y="272">range request · foreground service</text>

  <line class="arrow" x1="300" y1="288" x2="428" y2="288" marker-end="url(#arrowhead)"/>
  <text class="sub label" x="306" y="284">startForeground · ongoing notification</text>

  <line class="arrow" x1="300" y1="310" x2="548" y2="310" marker-end="url(#arrowhead)"/>
  <text class="sub label" x="310" y="306">GET · Range: bytes=412345678- · If-Range: "abc123"</text>

  <!-- ETag-changed branch -->
  <rect class="alt-box" x="240" y="324" width="320" height="56" rx="6"/>
  <text class="sub alt-lbl" x="248" y="340">opt — ETag changed · server returns 200 not 206</text>
  <line class="arrow-back" x1="550" y1="358" x2="302" y2="358" marker-end="url(#arrowhead)"/>
  <text class="sub label-back" x="310" y="354">200 OK · discard .part · restart from byte 0</text>

  <line class="arrow-back" x1="550" y1="396" x2="302" y2="396" marker-end="url(#arrowhead)"/>
  <text class="sub label-back" x="310" y="392">206 Partial · stream remaining bytes</text>

  <!-- Streaming loop -->
  <rect class="loop-box" x="240" y="412" width="460" height="106" rx="6"/>
  <text class="sub loop-lbl" x="250" y="430">loop — append chunk · emit progress</text>

  <line class="arrow" x1="300" y1="450" x2="658" y2="450" marker-end="url(#arrowhead)"/>
  <text class="sub label" x="308" y="446">append to model.gguf.part</text>

  <line class="arrow" x1="300" y1="472" x2="173" y2="472" marker-end="url(#arrowhead)"/>
  <text class="sub label" x="180" y="468">BitnetDownloadProgress event</text>

  <line class="arrow-back" x1="175" y1="494" x2="68" y2="494" marker-end="url(#arrowhead)"/>
  <text class="sub label-back" x="75" y="490">onProgress({ bytesDownloaded, totalBytes })</text>

  <!-- Checksum + commit -->
  <line class="phase-rule" x1="20" y1="538" x2="700" y2="538"/>
  <text class="phase-lbl"  x="20" y="556">checksum · atomic commit</text>

  <line class="arrow" x1="300" y1="574" x2="658" y2="574" marker-end="url(#arrowhead)"/>
  <text class="sub label" x="308" y="570">read model.gguf.part · compute SHA-256</text>
  <line class="arrow-back" x1="660" y1="594" x2="302" y2="594" marker-end="url(#arrowhead)"/>
  <text class="sub label-back" x="308" y="590">digest</text>

  <text class="sub label" x="240" y="614">verify against expected · else E_CHECKSUM_MISMATCH</text>

  <line class="arrow" x1="300" y1="636" x2="658" y2="636" marker-end="url(#arrowhead)"/>
  <text class="sub label" x="308" y="632">rename model.gguf.part → model.gguf · write meta.json (complete:true)</text>

  <line class="arrow" x1="300" y1="658" x2="428" y2="658" marker-end="url(#arrowhead)"/>
  <text class="sub label" x="306" y="654">stopForeground · dismiss notification</text>

  <line class="arrow-back" x1="298" y1="680" x2="177" y2="680" marker-end="url(#arrowhead)"/>
  <text class="sub label-back" x="180" y="676">CachedModelEntry { localPath, complete:true }</text>
  <line class="arrow-back" x1="173" y1="698" x2="68" y2="698" marker-end="url(#arrowhead)"/>
  <text class="sub label-back" x="75" y="694">resolves Promise</text>

  <!-- ===================== Phase 3: Engine.load picks up the cached file ===================== -->
  <line class="phase-rule" x1="20" y1="722" x2="700" y2="722"/>
  <text class="phase-lbl"  x="20" y="740">subsequent Engine.load reuses the cache</text>

  <line class="arrow" x1="65" y1="760" x2="173" y2="760" marker-end="url(#arrowhead)"/>
  <text class="sub label" x="74" y="756">Engine.load({ modelRef })</text>

  <text class="sub label" x="125" y="778">resolve(ref) → cacheKey</text>

  <line class="arrow" x1="175" y1="798" x2="658" y2="798" marker-end="url(#arrowhead)"/>
  <text class="sub label" x="180" y="794">stat → meta.json complete:true · skip download</text>

  <line class="arrow-back" x1="660" y1="818" x2="68" y2="818" marker-end="url(#arrowhead)"/>
  <text class="sub label-back" x="75" y="814">resolves instantly with cached localPath · proceed to native engine load</text>
</svg>
